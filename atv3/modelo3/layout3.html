<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Layout 3</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <div class="header-esquerda">
      <img class="logo" src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/github-white-icon.png" alt="GitHub">
      <nav>
        <a href="#">Plataforma</a>
        <a href="#">Soluções</a>
        <a href="#">Recursos</a>
        <a href="#">Código aberto</a>
        <a href="#">Enterprise</a>
        <a href="#">Preços</a>
      </nav>
    </div>
    <div class="header-direita">
      <button class="btn-busca" aria-label="Buscar"><img src="https://img.freepik.com/vetores-gratis/lupula-com-olho-estilo-glifo_78370-6938.jpg?semt=ais_hybrid&w=740&q=80" alt="Buscar"></button>
      <a href="#" class="btn-link">Entrar</a>
      <a href="#" class="btn-criar">Criar uma conta</a>
    </div>
  </header>

  <main>
    <section class="principal">
      <h1>O futuro do desenvolvimento de software acontece em conjunto</h1>
      <p>As ferramentas e as tendências evoluem, mas a colaboração permanece. Com o GitHub, desenvolvedores, agentes e
        código se unem em uma única plataforma.</p>
      <div class="grupo-acoes">
        <input type="email" placeholder="Digite seu e-mail">
        <button class="btn-cadastro">Cadastrar-se no GitHub</button>
        <button class="btn-copilot">Experimente o GitHub Copilot Free</button>
      </div>
    </section>
  </main>

</body>

</html>
